<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmileSchool</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <a href="#" class="logo-link">
            <img class="logo-icon" src="images/logo_image.png" alt="SmileSchool Logo">
        </a>
        <nav class="navbar">
            <a href="#">COURSES</a>
            <a href="#">PRICING</a>
            <a href="#">LOGIN</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Get schooled</h1>
            <div class="keywords">
                <span>SMILES</span>
                <span>GRIN</span>
                <span>LAUGH</span>
            </div>
            <button class="btn-primary">REGISTER FOR FREE</button>
            <p class="pros-title"><span class="purple-text">Learn</span> from the pros</p>

            <div class="pros-grid">
                <div class="pro-card">
                    <img src="images/profile-1.png" alt="Phillip Massey">
                    <h3>Phillip Massey</h3>
                    <p>« Smile of the year » <br> 2018-2019</p>
                </div>
                <div class="pro-card">
                    <img src="images/profile-2.png" alt="Nannie Lawrence">
                    <h3>Nannie Lawrence</h3>
                    <p>Best « Little smile » <br> 2017</p>
                </div>
                <div class="pro-card">
                    <img src="images/profile-3.png" alt="Bruce Walters">
                    <h3>Bruce Walters</h3>
                    <p>Best « Friend Smile » <br> live performance 2019</p>
                </div>
                <div class="pro-card">
                    <img src="images/profile-4.png" alt="Henry Hughes">
                    <h3>Henry Hughes</h3>
                    <p>« 24h smiles » winner <br> 2016-2019</p>
                </div>
            </div>
        </section>

        <section class="quotes">
            </section>
        
        <section class="popular">
            </section>
    </main>
</body>
</html>
