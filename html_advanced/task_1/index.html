<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Page</title>
</head>
<body>
    <header>
        <a href="/">
            <img src="../assets/logo.svg" alt="Logo">
        </a>
        <div>
            <a href="/">COURSES</a>
            <a href="/">PRICING</a>
            <a href="/">LOGIN</a>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="title">
                <h1>Get schooled</h1>
                <p>SMILES GRIN LAUGH</p>
                <button>REGISTER FOR FREE</button>
            </div>
            <div class="pros">
                <h2><span class="purple-word">Learn</span> from the pros</h2>
                <div class="people">
                    <div>
                        <img src="../assets/profile_1.png" alt="Person" class="round-image">
                        <h3>Philip Massey</h3>
                        <p>« Smile of the year » 2018 - 2019</p>
                    </div>
                    <div>
                        <img src="../assets/profile_2.png" alt="Person" class="round-image">
                        <h3>Nannie Lawrence</h3>
                        <p>Best « little smile » 2017</p>
                    </div>
                    <div>
                        <img src="../assets/profile_3.png" alt="Person" class="round-image">
                        <h3>Bruce Walters</h3>
                        <p>Best « Friend Smile » live performance 2019</p>
                    </div>
                    <div>
                        <img src="../assets/profile_4.png" alt="Person" class="round-image">
                        <h3>Henry Hughes</h3>
                        <p>« 24h smiles » winner 2016 - 2019</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
